# Полный vhost fabrika-tentov.ru (ISPmanager / Beget-стиль).
# Замените им текущий конфиг сайта или скопируйте в «доп. директивы» с учётом дублей.
# Проверка: sudo nginx -t && sudo systemctl reload nginx
#
# Предполагается: Gunicorn 127.0.0.1:8001, статика collectstatic → backend/staticfiles,
# медиа → backend/media, фронт → frontend/dist. PHP и @php удалены — сайт на Django + SPA.

server {
	listen 88.85.174.216:80;
	server_name fabrika-tentov.ru www.fabrika-tentov.ru;

	charset UTF-8;
	index index.html;
	disable_symlinks if_not_owner from=$root_path;

	include /etc/nginx/vhosts-includes/*.conf;
	include /etc/nginx/vhosts-resources/fabrika-tentov.ru/*.conf;
	include /etc/nginx/users-resources/kasatkin_da/*.conf;
	include /etc/nginx/modules-includes/phpcomposer/*.conf;

	access_log /var/www/httpd-logs/fabrika-tentov.ru.access.log;
	error_log /var/www/httpd-logs/fabrika-tentov.ru.error.log notice;

	set $root_path /var/www/kasatkin_da/data/www/fabrika-tentov.ru;
	root $root_path;

	client_max_body_size 32m;

	location ^~ /api/ {
		proxy_pass http://127.0.0.1:8001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location ^~ /admin/ {
		proxy_pass http://127.0.0.1:8001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location ^~ /captcha/ {
		proxy_pass http://127.0.0.1:8001;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location = /sitemap.xml {
		proxy_pass http://127.0.0.1:8001;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location ^~ /static/ {
		alias /var/www/kasatkin_da/data/www/fabrika-tentov.ru/backend/staticfiles/;
	}

	location ^~ /media/ {
		alias /var/www/kasatkin_da/data/www/fabrika-tentov.ru/backend/media/;
	}

	location / {
		root /var/www/kasatkin_da/data/www/fabrika-tentov.ru/frontend/dist;
		try_files $uri $uri/ /index.html;
	}
}

server {
	listen 88.85.174.216:443 ssl;
	server_name fabrika-tentov.ru www.fabrika-tentov.ru;

	ssl_certificate "/var/www/httpd-cert/kasatkin_da/fabrika-tentov.ru_le1.crtca";
	ssl_certificate_key "/var/www/httpd-cert/kasatkin_da/fabrika-tentov.ru_le1.key";
	ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
	ssl_prefer_server_ciphers on;
	ssl_protocols TLSv1.2 TLSv1.3;
	add_header Strict-Transport-Security "max-age=31536000;";
	ssl_dhparam /etc/ssl/certs/dhparam4096.pem;

	charset UTF-8;
	index index.html;
