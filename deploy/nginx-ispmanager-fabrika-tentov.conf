# Образец для ISPmanager: блоки для вставки в ОБА server {} (порт 80 и 443).
# Перед правкой сделайте бэкап: sudo cp путь/к/конфигу путь/к/конфигу.bak
#
# Важно:
# 1) Удалите или замените старый блок location / { try_files ... index.php } на вариант ниже.
# 2) Блоки location /api/, /admin/, ... должны быть В ТОМ ЖЕ server {}, что и root.
# 3) После правок: sudo nginx -t && sudo systemctl reload nginx

# --- вставить ПЕРЕД location / (или заменить весь location /) ---

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /admin/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /captcha/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /sitemap.xml {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /static/ {
    alias /var/www/kasatkin_da/data/www/fabrika-tentov.ru/backend/staticfiles/;
}

location ^~ /media/ {
    alias /var/www/kasatkin_da/data/www/fabrika-tentov.ru/backend/media/;
}

# Витрина (React build): вместо PHP-индекса
location / {
    root /var/www/kasatkin_da/data/www/fabrika-tentov.ru/frontend/dist;
    try_files $uri $uri/ /index.html;
}

client_max_body_size 32m;
