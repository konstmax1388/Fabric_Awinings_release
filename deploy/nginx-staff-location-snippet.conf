# Вставить в КАЖДЫЙ server { } для fabrika-tentov.ru (порт 80 и 443)
# СТРОГО ПЕРЕД блоком:  location / {
#
# Иначе GET /staff/orders/1/show попадает в try_files витрины → /index.html → грузится не та SPA → 404.

location = /staff {
	return 302 /staff/;
}

location ^~ /staff/ {
	root /var/www/kasatkin_da/data/www/fabrika-tentov.ru/frontend/dist;
	index index.html;
	try_files $uri $uri/ /staff/index.html;
}
