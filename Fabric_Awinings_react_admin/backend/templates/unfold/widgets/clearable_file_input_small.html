{% load i18n %}

<div class="admin-file-upload-with-hint admin-file-dropzone-root max-w-2xl w-full min-w-0">
    <p class="mb-2 text-xs font-medium text-font-important-light dark:text-font-important-dark">
        {% trans "Файл с компьютера — клик или перетаскивание (JPG, PNG, WebP, SVG и др.)" %}
    </p>

    <div
        class="rounded-default border-2 border-dashed border-base-300 bg-base-50/90 p-2 dark:border-base-600 dark:bg-base-800/50"
        data-admin-file-dropzone
    >
        <div class="flex flex-row flex-wrap items-stretch gap-2 sm:flex-nowrap">
            <div class="{{ widget.file_wrapper_class }} admin-file-inner-row !max-w-none min-w-0 grow !border-0 !shadow-none">
                {% if widget.is_initial and not widget.required %}
                    <div class="bg-base-50 border-r border-base-200 flex flex-none items-center self-stretch px-3 dark:bg-white/[.02] dark:border-r-base-700">
                        <label for="{{ widget.checkbox_id }}" class="flex items-center">
                            <input type="checkbox"{% if widget.class %} class="{{ widget.class }}"{% endif %} name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}" />

                            <span class="ml-2 text-sm">
                                {{ widget.clear_checkbox_label }}
                            </span>
                        </label>
                    </div>
                {% endif %}

                <label for="{{ widget.attrs.id }}" class="flex min-h-[44px] grow relative min-w-0 cursor-pointer items-center">
                    <input
                        type="text"
                        disabled
                        class="fabric-dropzone-placeholder grow border-0 bg-transparent font-medium min-w-0 px-3 py-2 text-ellipsis text-sm focus:ring-0"
                        aria-label="{% trans 'Зона загрузки файла' %}"
                        value="{% if widget.value %}{{ widget.value.url }}{% else %}{% trans 'Нажмите или перетащите' %}{% endif %}"
                    />
                    <span class="pointer-events-none absolute inset-0" aria-hidden="true"></span>
                </label>

                <div class="flex flex-none items-center leading-none self-stretch bg-white dark:bg-base-900">
                    <div class="h-0 w-0 overflow-hidden opacity-0">
                        <input type="{{ widget.type }}" name="{{ widget.name }}" {% include "django/forms/widgets/attrs.html" %} />
                    </div>

                    {% if widget.is_initial %}
                        <a href="{{ widget.value.url }}" class="border-r border-base-200 cursor-pointer text-base-400 px-3 hover:text-base-700 dark:border-base-700 dark:text-base-500 dark:hover:text-base-200" target="_blank" rel="noopener noreferrer">
                            <span class="material-symbols-outlined">download</span>
                        </a>
                    {% endif %}

                    <label for="{{ widget.attrs.id }}" class="cursor-pointer text-primary-600 px-3 hover:text-primary-800 dark:text-primary-400" title="{% trans 'Выбрать файл' %}">
                        <span class="material-symbols-outlined">upload</span>
                    </label>
                </div>
            </div>

            {% if widget.attrs.accept == 'image/*' and widget.is_initial %}
                <div class="h-11 w-11 shrink-0 overflow-hidden rounded-default border border-base-200 dark:border-base-700">
                    <a href="{{ widget.value.url }}" target="_blank" rel="noopener noreferrer" class="block h-full w-full bg-cover bg-center" style="background-image: url('{{ widget.value.url }}')" title="{% trans 'Просмотр' %}"></a>
                </div>
            {% endif %}
        </div>
    </div>
</div>
