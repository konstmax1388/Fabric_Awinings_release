# Изолированное имя проекта — не пересекается с другими compose-стеками на ПК.
# Порт задайте в .env (см. .env.example).

name: fabric-awnings

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${FABRIC_API_PORT:-18000}:8000"
    volumes:
      - ./backend:/app
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api,0.0.0.0
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:17300,http://127.0.0.1:17300,http://localhost:5173,http://127.0.0.1:5173}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      # Хост: по умолчанию 17300 — не пересекается с типичным Vite 5173 других проектов.
      - "${FABRIC_FRONTEND_PORT:-17300}:5173"
    volumes:
      - ./frontend:/app
      - fabric_awnings_frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:18000}
    depends_on:
      - api
    stdin_open: true
    tty: true

volumes:
  fabric_awnings_frontend_node_modules:
