# Изолированное имя проекта — не пересекается с другими compose-стеками на ПК.
# Порт задайте в .env (см. .env.example).

name: fabric-awnings

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FABRIC_FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - fabric_awnings_frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    stdin_open: true
    tty: true

volumes:
  fabric_awnings_frontend_node_modules:
