<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/branding/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css"
      crossorigin="anonymous"
    />
    <title>Фабрика Тентов — dev</title>
  </head>
  <body>
    <!--
      Без отдельного location /staff/ в nginx глубокий URL /staff/orders/… отдаёт ЭТОТ index (витрина).
      Редирект в hash — тогда запрос к серверу только /staff/, поднимается бандл admin-ui (см. deploy/nginx-staff-location-snippet.conf).
    -->
    <script>
      ;(function () {
        var p = location.pathname
        if (p === '/staff' || p === '/staff/') return
        if (p.indexOf('/staff/') !== 0) return
        var inner = p.slice('/staff/'.length)
        if (!inner) return
        if (location.hash && location.hash.length > 1) return
        location.replace('/staff/#/' + inner + location.search)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
